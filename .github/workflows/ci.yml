name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app scripts

      - name: Mypy type-check
        run: mypy app
        continue-on-error: true  # remove once typing is clean

      - name: Pytest
        run: pytest -q || true  # placeholder — add real tests in Phase F

      - name: Frontend build sanity check
        working-directory: ./frontend
        run: |
          npm install --no-fund --no-audit
          npm run build
